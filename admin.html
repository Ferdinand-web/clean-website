<!DOCTYPE html>
<html>
<head>
  <title>Admin - MKONGE NET</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
    }

    .code {
      margin-top: 15px;
      font-size: 18px;
      color: yellow;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>VOUCHER ADMIN</h2>

  <button onclick="generate()">Generate Voucher</button>

  <div class="code" id="code">----</div>
</div>

<script>
function generate() {
  let code = "MK" + Math.floor(Math.random() * 1000000);
  document.getElementById("code").innerText = code;
}
</script>

</body>
</html>
