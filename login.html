<script>
async function login() {
  let code = document.getElementById("voucher").value;

  let response = await fetch("vouchers.txt");
  let text = await response.text();
  let vouchers = text.split("\n");

  if(vouchers.includes(code)) {
    alert("Access Granted - Internet Activated");
  } else {
    alert("Invalid Voucher");
  }
}
</script>
