<!DOCTYPE html>
<html>
<head>
  <title>MKONGE NET Login</title>
</head>

<body>
  <h2>MKONGE NET LOGIN PAGE</h2>

  <input type="text" id="voucher" placeholder="Enter Voucher Code">
  <button onclick="login()">Login</button>

  <script>
    function login() {
      let code = document.getElementById("voucher").value;

      if(code === "1234" || code === "FREE2026") {
        alert("ACCESS GRANTED");
      } else {
        alert("INVALID VOUCHER");
      }
    }
  </script>
</body>
</html>
