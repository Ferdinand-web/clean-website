<!DOCTYPE html>
<html>
<head>
  <title>MKONGE NET Login</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 95%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>MKONGE NET LOGIN</h2>

  <input type="text" id="voucher" placeholder="Enter Voucher Code">

  <button onclick="login()">CONNECT</button>

  <div id="msg"></div>
</div>

<script>
function login() {
  let code = document.getElementById("voucher").value.trim();

  let vouchers = ["1234", "5678", "FREE2026", "MK1001", "VIP2026"];

  if(vouchers.includes(code)) {
    document.getElementById("msg").style.color = "green";
    document.getElementById("msg").innerText = "ACCESS GRANTED - CONNECTING...";
  } else {
    document.getElementById("msg").style.color = "red";
    document.getElementById("msg").innerText = "INVALID VOUCHER - CONTACT ADMIN";
  }
}
</script>

</body>
</html>
