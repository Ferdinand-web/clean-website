<script>
async function login() {
  let code = document.getElementById("voucher").value.trim();

  let response = await fetch("vouchers.txt");
  let text = await response.text();

  let vouchers = text
    .split("\n")
    .map(v => v.trim())
    .filter(v => v !== "");

  if(vouchers.includes(code)) {
    alert("ACCESS GRANTED - INTERNET ACTIVE");
  } else {
    alert("INVALID VOUCHER");
  }
}
</script>
