/* HEADER */

color:white;

.side-menu a:hover{

}

.side-menu.active{left:0;}

.close-btn{
position:absolute;

}

.hero::before{
content:"";position:absolute;inset:0;

linear-gradient(rgba(5,11,24,0.6),rgba(5,11,24,0.95)),

.hero h1{font-size:3rem;color:#00e5ff;}

.btn{

/* SECTIONS */
section{padding:85px 8%;}
.title{text-align:center;font-size:2.2rem;color:#00e5ff;margin-bottom:40px;}

/* ABOUT */
.about-container{

.about-img{

.about-img:hover{transform:scale(1.05);}

.about-container p{

/* PACKAGES */

gap:20px;

.card{

/* GALLERY */
.gallery-wrapper{max-width:900px;margin:auto;overflow:hidden;border-radius:15px;}

.gallery-slide img{width:100%;height:450px;object-fit:cover;border-radius:15px;}

@keyframes fade{from{opacity:0}to{opacity:1}}

/* CONTACT */

/* WHATSAPP */

@keyframes pulse{

<script>
let lang = "en";

function applyLanguage(){
 document.querySelectorAll("[data-en]").forEach(el=>{
   const text = el.getAttribute("data-" + lang);
   if(text) el.textContent = text;
 });
}

function toggleLanguage(){
 lang = (lang === "en") ? "sw" : "en";
 applyLanguage();
}

function toggleMenu(){
 document.getElementById("sideMenu").classList.toggle("active");
}

let index = 0;
let slides = [];

function show(){
 if(!slides.length) return;
 slides.forEach(s => s.style.display = "none");
 slides[index].style.display = "block";
}

window.addEventListener("DOMContentLoaded",()=>{
 applyLanguage();

 slides = document.querySelectorAll(".gallery-slide");

 if(slides.length){
   show();
   setInterval(()=>{
     index++;
     if(index >= slides.length) index = 0;
     show();
   },3000);
 }
});
</script>
