/* HEADER */

.lang-btn{

align-items:center;
justify-content:center;
text-align:center;
padding:20px;

}

content:"";
position:absolute;

linear-gradient(rgba(5,11,24,0.6),rgba(5,11,24,0.95)),

margin-bottom:40px;

/* ABOUT */

align-items:center;
gap:25px;

justify-content:center;
}

.about-img{
width:260px;
height:260px;

.about-img:hover{

.about-container p{
max-width:600px;
font-size:16px;
line-height:1.6;
color:#ddd;
}

/* GRID */
.packages{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.04);
padding:25px;
border-radius:15px;
text-align:center;
border:1px solid rgba(0,229,255,0.15);
cursor:pointer;
}

/* GALLERY */
.gallery-wrapper{
max-width:900px;
margin:auto;
overflow:hidden;
border-radius:15px;
}

.gallery-slide{
display:none;
animation:fade 1s ease;
}

.gallery-slide img{
width:100%;
height:450px;
object-fit:cover;
border-radius:15px;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* PAYMENT IMAGES */
.card img{
width:120px;
height:80px;
object-fit:contain;
margin-bottom:10px;
}

/* HOW TO PAY */
#howtopay .card{

border-left:4px solid #00e5ff;
}

#howtopay h3{
color:#00e5ff;
margin-bottom:8px;
}

/* CONTACT */
.contact{

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.box{
background:rgba(255,255,255,0.04);
padding:18px;
border-radius:10px;
text-align:center;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:65px;
height:65px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
animation:pulse 1.8s infinite;
z-index:9999;
}

.whatsapp img{
width:32px;
height:32px;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(37,211,102,0.7);}
70%{box-shadow:0 0 0 18px rgba(37,211,102,0);}
100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#0b1220;
padding:25px;
border-radius:12px;
width:90%;
max-width:420px;
text-align:center;
border:1px solid #00e5ff;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
color:white;
}

</style>
</head>

<script>

/* LANGUAGE FIX */
let lang = "en";

function applyLanguage(){
document.querySelectorAll("[data-en]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});
}

function toggleLanguage(){
lang = (lang === "en") ? "sw" : "en";
applyLanguage();
}

window.addEventListener("DOMContentLoaded", applyLanguage);

/* GALLERY */
let index = 0;
const slides = document.querySelectorAll(".gallery-slide");

function show(){
slides.forEach(s=>s.style.display="none");
slides[index].style.display="block";
}

setInterval(()=>{
index++;
if(index>=slides.length) index=0;
show();
},3000);

show();

/* PAYMENT MODAL */
function openPayment(title,enText,swText){
alert(title + "\n\n" + (lang==="en"?enText:swText));
}

</script>
